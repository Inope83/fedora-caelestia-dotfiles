# ### Hyprland ###
# Apps
$terminal = foot
$browser = firefox
$editor = codium
$fileExplorer = nautilus

# Touchpad
$touchpadDisableTyping = true
$touchpadScrollFactor = 0.3
$workSpaceSwipeFingers = 3

# Blur
$blurEnabled = false
$blurSpecialWs = false
$blurPopups = true
$blurInputMethods = true
$blurSize = 8
$blurPasses = 2
$blurXray = false

# Shadow
$shadowEnabled = true
$shadowRange = 20
$shadowRenderPower = 3
$shadowColour = rgba($surfaced4)
$shadowColor = rgba(c2c1ff66)

# Gaps
$workspaceGaps = 1
$windowGapsIn = 5
$windowGapsOut = 10
$singleWindowGapsOut = 10

# Window styling
$windowOpacity = 1
$windowRounding = 10
$windowBorderSize = 3

#$activeWindowBorderColour = rgba($primarye6)
#$inactiveWindowBorderColour = rgba($onSurfaceVariant11)
# Border colors - Menggunakan warna dari current.conf
#$activeWindowBorderColour = rgba($primary)
#$inactiveWindowBorderColour = rgba($onSurfaceVariant)

# Border colors - Menggunakan warna dari current.conf (format rgb)
$activeWindowBorderColour = rgb($primary)
$inactiveWindowBorderColour = rgb($onSurfaceVariant)

# Misc
$volumeStep = 10  # In percent
$cursorTheme = Bibata-Modern-Ice
$cursorSize = 24


# ### Keybinds ###
# Workspaces
$kbMoveWinToWs = Super+Alt
$kbMoveWinToWsGroup = Ctrl+Super+Alt
$kbGoToWs = Super
$kbGoToWsGroup = Ctrl+Super

$kbNextWs = Ctrl+Super, right
$kbPrevWs = Ctrl+Super, left

$kbToggleSpecialWs = Super, S

# Window groups
$kbWindowGroupCycleNext = Alt, Tab
$kbWindowGroupCyclePrev = Shift+Alt, Tab
$kbUngroup = Super, U
$kbToggleGroup = Super, Comma

# Window actions
$kbMoveWindow = Super, Z
$kbResizeWindow = Super, X
$kbWindowPip = Super+Alt, Backslash
$kbPinWindow = Super, P
$kbWindowFullscreen = Super, F
$kbWindowBorderedFullscreen = Super+Alt, F
$kbToggleWindowFloating = Super+Alt, Space
$kbCloseWindow = Super, Q

# Special workspace toggles
$kbSystemMonitor = Ctrl+Shift, Escape
$kbMusic = Super, M
$kbCommunication = Super, D
$kbTodo = Super, R

# Apps
$kbTerminal = Super, T
$kbBrowser = Super, B
$kbEditor = Super, C
$kbFileExplorer = Super, E

# Misc
$kbSession = Ctrl+Alt, Delete
$kbClearNotifs = Ctrl+Alt, C
$kbShowPanels = Super, K
$kbLock = Super, L
$kbRestoreLock = Super+Alt, L
